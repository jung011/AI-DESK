name: Backend Docker Build and Push

on:
  push:
    tags:
      - 'be-*'  # backend tag prefix

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is from master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor origin/master ${{ github.sha }}; then
            echo "::error::This tag is not from master. Failing the build."
            exit 1
          fi

      - name: Extract version from tag
        run: |
          # be-1.52-rc1 → 1.52-rc1
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/be-}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: jsh125/aidesk-backend:${{ env.IMAGE_TAG }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update backend image tag in Helm/values.yaml
        run: |
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' Helm/values.yaml

      - name: Commit and Push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Helm/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to values.yaml — skip commit."
            exit 0
          fi
          git commit -m "chore(helm): bump backend image tag to ${IMAGE_TAG}"
          git push origin HEAD:master
