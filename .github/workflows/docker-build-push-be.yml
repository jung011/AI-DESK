name: Backend Docker Build and Push

on:
  push:
    tags:
      - 'be-*'  # backend tag prefix

jobs:
  build-and-push:
    # 우드 K8s 노드 = arm64 only (Docker Desktop linuxkit, Apple Silicon).
    # native arm64 runner 사용 → QEMU emulation 불필요 → multi-arch 빌드 시간 대폭 단축.
    # amd64 노드 추가되면 platforms 에 linux/amd64 다시 추가하고 runner 는 ubuntu-latest 로.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is from master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor origin/master ${{ github.sha }}; then
            echo "::error::This tag is not from master. Failing the build."
            exit 1
          fi

      - name: Extract version from tag
        run: |
          # be-1.52-rc1 → 1.52-rc1
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/be-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push arm64 backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: jsh125/aidesk-backend:${{ env.IMAGE_TAG }}
          # GHA cache — Dockerfile 의 layer + BuildKit cache mount (gradle deps) 보존.
          # 의존성 안 바뀐 build 는 application classes layer 만 재 build → 매우 빠름.
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_arm64
          sudo chmod +x /usr/local/bin/yq

      - name: Update backend image tag in Helm/values.yaml
        run: |
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' Helm/values.yaml

      - name: Commit and Push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Helm/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to values.yaml — skip commit."
            exit 0
          fi
          git commit -m "chore(helm): bump backend image tag to ${IMAGE_TAG}"
          git push origin HEAD:master
