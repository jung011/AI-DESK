name: Backend-py (FastAPI) Docker Build and Push

on:
  push:
    tags:
      - 'bepy-*'  # FastAPI 마이그 image tag

# 기존 be / fe workflow 와 다른 group — bepy 는 별도 image (jsh125/aidesk-backend-py).
# 마이그 검증 단계라 helm values.yaml 자동 bump 없음. prod 영향 X.
concurrency:
  group: deploy-pipeline-bepy
  cancel-in-progress: false

jobs:
  build-and-push:
    # 우드 K8s 노드 = arm64 only.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read  # helm bump 없으니 write 불필요

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          # bepy-0.1.0-rc1 → 0.1.0-rc1
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/bepy-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push arm64 backend-py image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-py
          file: ./backend-py/Dockerfile
          platforms: linux/arm64
          push: true
          tags: jsh125/aidesk-backend-py:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend-py
          cache-to: type=gha,scope=backend-py,mode=max
