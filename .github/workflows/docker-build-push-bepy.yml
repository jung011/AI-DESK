name: Backend-py (FastAPI) Docker Build and Push

on:
  push:
    tags:
      - 'bepy-*'  # FastAPI 마이그 image tag

# fe / be 통합 group — 둘 다 Helm/values.yaml 의 helm bump auto commit 박아 동시 진행 시
# *non-fast-forward + rebase conflict* 사고 빈번 (fe-rc75/76/77 cycle 3번 fail). 단일
# lock 박아 직렬 — 다른 workflow 끝날 때까지 대기. cancel-in-progress: true 로 *옛
# in-progress fail* 시 다음 run 자동 retry.
concurrency:
  group: deploy-pipeline
  cancel-in-progress: true

jobs:
  build-and-push:
    # 우드 K8s 노드 = arm64 only.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write  # helm bump commit + master push 위해 write 필요

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          # bepy-0.1.0-rc1 → 0.1.0-rc1
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/bepy-}" >> "$GITHUB_ENV"

      - name: Set up Bun (aidesk-channel mcp standalone binary build)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Build mcp standalone binaries (darwin-arm64 / linux-x64 / linux-arm64)
        run: |
          set -e
          cd aidesk-channel
          bun install
          mkdir -p ../backend-py/static/mcp
          bun build --compile --target=bun-darwin-arm64 src/server.js --outfile ../backend-py/static/mcp/aidesk-channel-mcp-darwin-arm64
          bun build --compile --target=bun-linux-x64    src/server.js --outfile ../backend-py/static/mcp/aidesk-channel-mcp-linux-x64
          bun build --compile --target=bun-linux-arm64  src/server.js --outfile ../backend-py/static/mcp/aidesk-channel-mcp-linux-arm64
          ls -la ../backend-py/static/mcp/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push arm64 backend-py image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-py
          file: ./backend-py/Dockerfile
          platforms: linux/arm64
          push: true
          tags: jsh125/aidesk-backend-py:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend-py
          cache-to: type=gha,scope=backend-py,mode=max

      # rc48 추가 — helm values.yaml 의 backend image tag 자동 bump + master push.
      # ArgoCD auto sync 가 master 변경 감지 → prod swap. 수동 step 제거.
      # rc53 (2026-06-23) — fe / bepy workflow 동시 trigger 시 master push race
      # ("cannot lock ref") 사고로 helm bump 누락. retry-on-conflict 5회.
      - name: Helm values.yaml — backend tag bump (with retry)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin master
            # rc54 fix — reset --hard origin/master 만 하면 detached HEAD 라 push origin
            # master 시 "src refspec master does not match any" 발생.
            # switch -C 로 *local master branch* 가 origin/master 가리키게 강제.
            git switch -C master origin/master
            # backend image tag 만 매치 (frontend tag 형식 = 1.30.7-rc21 와 다름)
            # Helm/ (대문자) — git case-sensitive, macOS 의 helm/ 와 다름
            sed -i 's|tag: "0\.1\.0-rc[0-9]\+"|tag: "${{ env.IMAGE_TAG }}"|' Helm/values.yaml
            if git diff --quiet Helm/values.yaml; then
              echo "values.yaml unchanged — already on $IMAGE_TAG (skip)"
              exit 0
            fi
            git add Helm/values.yaml
            git commit -m "deploy(be): helm bump ${{ env.IMAGE_TAG }} (auto from GHA)"
            if git push origin master 2>&1; then
              echo "✓ helm bump push success on attempt $attempt"
              exit 0
            fi
            echo "× push race detected on attempt $attempt — fetch + retry in $((attempt * 3))s"
            sleep $((attempt * 3))
          done
          echo "✗ helm bump push failed after 5 attempts — manual fix needed"
          exit 1
