name: Backend-py (FastAPI) Docker Build and Push

on:
  push:
    tags:
      - 'bepy-*'  # FastAPI 마이그 image tag

# 기존 be / fe workflow 와 다른 group — bepy 는 별도 image (jsh125/aidesk-backend-py).
# rc48 (2026-06-22) — helm bump 자동화 활성. 마이그 안정화 완료 + rc24/47/48 사이클로
# tag → image → helm → ArgoCD swap 패턴 검증됨. 수동 step (helm bump + master push) 제거.
concurrency:
  group: deploy-pipeline-bepy
  cancel-in-progress: false

jobs:
  build-and-push:
    # 우드 K8s 노드 = arm64 only.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write  # helm bump commit + master push 위해 write 필요

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          # bepy-0.1.0-rc1 → 0.1.0-rc1
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/bepy-}" >> "$GITHUB_ENV"

      - name: Set up Bun (aidesk-channel mcp standalone binary build)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Build mcp standalone binaries (darwin-arm64 / linux-x64 / linux-arm64)
        run: |
          set -e
          cd aidesk-channel
          bun install
          mkdir -p ../backend-py/static/mcp
          bun build --compile --target=bun-darwin-arm64 src/server.js --outfile ../backend-py/static/mcp/aidesk-channel-mcp-darwin-arm64
          bun build --compile --target=bun-linux-x64    src/server.js --outfile ../backend-py/static/mcp/aidesk-channel-mcp-linux-x64
          bun build --compile --target=bun-linux-arm64  src/server.js --outfile ../backend-py/static/mcp/aidesk-channel-mcp-linux-arm64
          ls -la ../backend-py/static/mcp/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push arm64 backend-py image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-py
          file: ./backend-py/Dockerfile
          platforms: linux/arm64
          push: true
          tags: jsh125/aidesk-backend-py:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend-py
          cache-to: type=gha,scope=backend-py,mode=max

      # rc48 추가 — helm values.yaml 의 backend image tag 자동 bump + master push.
      # ArgoCD auto sync 가 master 변경 감지 → prod swap. 수동 step 제거.
      - name: Helm values.yaml — backend tag bump
        run: |
          set -e
          # backend image tag 만 매치 (frontend tag 형식 = 1.30.7-rc21 와 다름)
          # 옛값: tag: "0.1.0-rcXX" → 새값: tag: "0.1.0-rcNEW"
          # Helm/ (대문자) — git case-sensitive, macOS 의 helm/ 와 다름
          sed -i 's|tag: "0\.1\.0-rc[0-9]\+"|tag: "${{ env.IMAGE_TAG }}"|' Helm/values.yaml
          if git diff --quiet Helm/values.yaml; then
            echo "values.yaml unchanged — already on $IMAGE_TAG (skip)"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          # tag 자체는 detached HEAD 가능 — checkout master 후 적용
          sed -i 's|tag: "0\.1\.0-rc[0-9]\+"|tag: "${{ env.IMAGE_TAG }}"|' Helm/values.yaml
          git add Helm/values.yaml
          git commit -m "deploy(be): helm bump ${{ env.IMAGE_TAG }} (auto from GHA)"
          git push origin master
