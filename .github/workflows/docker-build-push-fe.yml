name: Frontend Docker Build and Push

on:
  push:
    tags:
      - 'fe-*'  # frontend tag prefix

# be / fe workflow 가 동시 실행되면 둘 다 master 에 helm bump commit + push 시도하다
# 한 쪽이 'fetch first' 로 rejected 됨. 같은 group 으로 묶어 순차 실행 강제.
concurrency:
  group: deploy-pipeline
  cancel-in-progress: false

jobs:
  build-and-push:
    # 우드 K8s 노드 = arm64 only (Docker Desktop linuxkit, Apple Silicon).
    # native arm64 runner 사용 → QEMU emulation 불필요 → Nuxt build 시간 대폭 단축
    # (multi-arch QEMU 빌드 25-40분 → native arm64 2-5분).
    # amd64 노드 추가되면 platforms 에 linux/amd64 다시 추가하고 runner 는 ubuntu-latest 로.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is from master
        run: |
          git fetch origin master
          # tag commit (github.sha) 이 master 의 ancestor 인지 = master 안에 *포함* 되는지.
          # 인자 순서 반대로 박으면 master HEAD 가 tag commit 의 ancestor 여야 통과 → master 가
          # 진행되는 순간 (helm bump commit 등) 무조건 fail → re-run 영영 fail. 인자 순서 주의.
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/master; then
            echo "::error::This tag is not from master. Failing the build."
            exit 1
          fi

      - name: Extract version from tag
        run: |
          # fe-1.30-rc1 → 1.30-rc1
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/fe-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push arm64 frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: jsh125/aidesk-frontend:${{ env.IMAGE_TAG }}
          # GHA cache — Dockerfile 의 npm install / nuxt build layer 보존.
          # node_modules 안 바뀐 build 는 cache hit, 코드 변경 만 재 build.
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_arm64
          sudo chmod +x /usr/local/bin/yq

      - name: Update frontend image tag in Helm/values.yaml
        run: |
          yq -i '.frontend.image.tag = "${{ env.IMAGE_TAG }}"' Helm/values.yaml

      - name: Commit and Push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Helm/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to values.yaml — skip commit."
            exit 0
          fi
          git commit -m "chore(helm): bump frontend image tag to ${IMAGE_TAG}"
          git push origin HEAD:master
