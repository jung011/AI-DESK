apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: aidesk-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: ai-desk
            path: Helm
            repoURL: https://github.com/jung011/AI-DESK.git
            targetRevision: master
          # self-managed (aidesk-apps-self) 는 *제거됨*.
          # ArgoCD 가 path 안 Chart.yaml 자동 helm 인식 → ApplicationSet template 의
          # {{name}} placeholder 가 helm function 으로 잘못 해석 → fail.
          # goTemplate 조건부 또는 source type 명시 fix 도 가능하지만 복잡 + ApplicationSet
          # 변경 빈도 매우 낮아 manual apply 받아들임이 실용적.

  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        targetRevision: '{{targetRevision}}'
        path: '{{path}}'
        helm:
          # values.yaml 이 chart 안 default 로 이미 사용. 별도 override 없음.
          # 운영자가 환경별 override 필요 시 valueFiles 또는 parameters 추가.
          # releaseName 은 우드 mac 의 현재 helm release 와 정합 ('aidesk').
          # 다른 이름이면 takeover 시 resource 이름 변경 → downtime.
          releaseName: aidesk
      destination:
        server: https://kubernetes.default.svc
        namespace: aidesk
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          # ServerSideApply: ArgoCD 가 kubernetes server-side apply 사용 → managed-fields
          # 기준으로 *변경된 필드만* patch. ignoreDifferences 의 jwt-secret-key 가 *진짜*
          # apply 단계에서도 무시되도록 함. client-side apply 면 full object replace 라
          # ignoreDifferences 가 *비교* 만 무시 + *apply 자체* 가 새 값 덮어쓰는 한계.
          - ServerSideApply=true
      # 매 sync 마다 helm template 가 secret.yaml 의 randAlphaNum 을 새로 평가해서
      # jwt-secret-key 가 rotate → 사용자 로그아웃 발생. ArgoCD 가 *secret 의 jwt-secret-key
      # 변경 자체를 비교 대상에서 제외* 해서 sync 가 그 키 안 건드림. db-password 등
      # 다른 키는 그대로 비교/sync.
      ignoreDifferences:
        - group: ""
          kind: Secret
          # helm fullname = release '{{ .Release.Name }}' + chart name → 'aidesk-ai-desk'.
          # 옛 'aidesk' 만 적었던 게 매칭 실패의 원인 — sync 마다 jwt rotate.
          name: aidesk-ai-desk
          jsonPointers:
            - /data/jwt-secret-key
            - /stringData/jwt-secret-key
