apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: aidesk-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: ai-desk
            path: Helm
            repoURL: https://github.com/jung011/AI-DESK.git
            targetRevision: master
          # self-managed (aidesk-apps-self) 는 *제거됨*.
          # ArgoCD 가 path 안 Chart.yaml 자동 helm 인식 → ApplicationSet template 의
          # {{name}} placeholder 가 helm function 으로 잘못 해석 → fail.
          # goTemplate 조건부 또는 source type 명시 fix 도 가능하지만 복잡 + ApplicationSet
          # 변경 빈도 매우 낮아 manual apply 받아들임이 실용적.

  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        targetRevision: '{{targetRevision}}'
        path: '{{path}}'
        helm:
          # values.yaml 이 chart 안 default 로 이미 사용. 별도 override 없음.
          # 운영자가 환경별 override 필요 시 valueFiles 또는 parameters 추가.
          # releaseName 은 우드 mac 의 현재 helm release 와 정합 ('aidesk').
          # 다른 이름이면 takeover 시 resource 이름 변경 → downtime.
          releaseName: aidesk
      destination:
        server: https://kubernetes.default.svc
        namespace: aidesk
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
      # jwt-secret-key 는 helm chart 에서 분리 — aidesk-ai-desk-jwt secret 별도 manual
      # kubectl 운영. helm 가 jwt 자체 안 만짐 → sync 마다 rotate 가능성 0. 옛 ignoreDifferences
      # fix 의 SSA apply 한계 (비교 skip 은 OK 그러나 apply 자체 덮어쓰기) 회피.
