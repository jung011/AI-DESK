apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: aidesk-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: ai-desk
            path: Helm
            repoURL: https://github.com/jung011/AI-DESK.git
            targetRevision: master
          # self-managed: ApplicationSet 이 자기 자신 manifest 도 sync.
          # = master 의 Helm-ArgoApp/ 변경이 *우드 manual kubectl apply 없이* 자동 반영.
          # 단 *첫 적용 시* 만 우드 manual 1 회 필요 (chicken-and-egg).
          - name: aidesk-apps-self
            path: Helm-ArgoApp
            repoURL: https://github.com/jung011/AI-DESK.git
            targetRevision: master

  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        targetRevision: '{{targetRevision}}'
        path: '{{path}}'
        helm:
          # values.yaml 이 chart 안 default 로 이미 사용. 별도 override 없음.
          # 운영자가 환경별 override 필요 시 valueFiles 또는 parameters 추가.
          # releaseName 은 우드 mac 의 현재 helm release 와 정합 ('aidesk').
          # 다른 이름이면 takeover 시 resource 이름 변경 → downtime.
          releaseName: aidesk
      destination:
        server: https://kubernetes.default.svc
        namespace: aidesk
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
      # 매 sync 마다 helm template 가 secret.yaml 의 randAlphaNum 을 새로 평가해서
      # jwt-secret-key 가 rotate → 사용자 로그아웃 발생. ArgoCD 가 *secret 의 jwt-secret-key
      # 변경 자체를 비교 대상에서 제외* 해서 sync 가 그 키 안 건드림. db-password 등
      # 다른 키는 그대로 비교/sync.
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: aidesk
          jsonPointers:
            - /data/jwt-secret-key
            - /stringData/jwt-secret-key
