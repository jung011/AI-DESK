apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-desk.fullname" . }}-backend
  labels:
    {{- include "ai-desk.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  # 무중단 롤링 업데이트 — 새 pod 가 readinessProbe 통과해 Ready 가 된 뒤에만 옛 pod 를 종료.
  # maxSurge=1 → 잠깐 (수 초) replicas=2 가 됐다가 옛 pod 가 빠지면서 1 로 회귀.
  # maxUnavailable=0 → 옛 pod 가 *항상 살아있는 상태* 라 service 가 끊기지 않음.
  # 잠시 scheduler 가 2 replica 에서 동시 실행되지만 RetryScheduler 의 markDelivered 가 idempotent.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ai-desk.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "ai-desk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        ai-desk/image-tag: {{ .Values.backend.image.tag | quote }}
        ai-desk/config-hash: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum | trunc 8 | quote }}
        ai-desk/secret-hash: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum | trunc 8 | quote }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-desk.fullname" . }}
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-desk.fullname" . }}
                  key: db-password
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-desk.fullname" . }}
                  key: jwt-secret-key
            {{- if .Values.backend.tz }}
            - name: TZ
              value: {{ .Values.backend.tz | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
