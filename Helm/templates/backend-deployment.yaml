apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-desk.fullname" . }}-backend
  labels:
    {{- include "ai-desk.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    # ServerSideApply 박음 — 옛 tcpSocket → httpGet 변경 시 *옛 field 자동 제거* path.
    # 3-way merge patch (default) 는 *기존 field 안 지움* → "more than 1 handler type"
    # 사고. SSA = 새 spec 의 *전체 replace* 패턴이라 안전.
    argocd.argoproj.io/sync-options: ServerSideApply=true,Replace=true
spec:
  replicas: 1
  # 무중단 롤링 업데이트 — 새 pod 가 readinessProbe 통과해 Ready 가 된 뒤에만 옛 pod 를 종료.
  # maxSurge=1 → 잠깐 (수 초) replicas=2 가 됐다가 옛 pod 가 빠지면서 1 로 회귀.
  # maxUnavailable=0 → 옛 pod 가 *항상 살아있는 상태* 라 service 가 끊기지 않음.
  # 잠시 scheduler 가 2 replica 에서 동시 실행되지만 RetryScheduler 의 markDelivered 가 idempotent.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ai-desk.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "ai-desk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        ai-desk/image-tag: {{ .Values.backend.image.tag | quote }}
        ai-desk/config-hash: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum | trunc 8 | quote }}
        ai-desk/secret-hash: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum | trunc 8 | quote }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-desk.fullname" . }}
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-desk.fullname" . }}
                  key: db-password
            - name: JWT_SECRET_KEY
              # jwt-secret-key 는 별도 secret (manual kubectl) 로 분리 — helm 가 jwt 자체
              # 안 만짐 → ArgoCD sync 마다 rotate 위험 0. 옛 fix (ignoreDifferences) 의 SSA
              # apply 한계 회피.
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-desk.fullname" . }}-jwt
                  key: jwt-secret-key
            {{- if .Values.backend.tz }}
            - name: TZ
              value: {{ .Values.backend.tz | quote }}
            {{- end }}
          # readiness — tcpSocket 박으면 *port open* 만 확인. app 의 진짜 ready (db
          # connect + broker init) 안 끝나도 ready 박혀 옛 pod 죽음 → 사용자 502 사고.
          # /api/health endpoint 박음 — *서비스 진짜 ready* 박혀야 통과.
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # liveness — 더 관대 박음 (실제 죽었을 때만 restart trigger). readiness 와 분리.
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          # lifecycle.preStop — SIGTERM 받기 전 5s 박아 옛 ws / SSE connection 의
          # *graceful drain* time 확보. service endpoint 에서 빠지면 새 traffic 안 옴.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      # graceful shutdown 시간 (기본 30s 인데 명시) — preStop + main process SIGTERM.
      terminationGracePeriodSeconds: 30
