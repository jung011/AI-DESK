apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-desk.fullname" . }}-backend
  labels:
    {{- include "ai-desk.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ai-desk.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "ai-desk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        ai-desk/image-tag: {{ .Values.backend.image.tag | quote }}
        ai-desk/config-hash: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum | trunc 8 | quote }}
        ai-desk/secret-hash: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum | trunc 8 | quote }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-desk.fullname" . }}
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-desk.fullname" . }}
                  key: db-password
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-desk.fullname" . }}
                  key: jwt-secret-key
            {{- if .Values.backend.tz }}
            - name: TZ
              value: {{ .Values.backend.tz | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
