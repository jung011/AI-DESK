apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-desk.fullname" . }}
  labels:
    {{- include "ai-desk.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: {{ include "ai-desk.db.jdbcUrl" . | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.database.username | quote }}
  {{- if .Values.backend.cors.allowedOrigins }}
  CORS_ALLOWED_ORIGINS: {{ .Values.backend.cors.allowedOrigins | quote }}
  {{- end }}
  MESSAGES_RETRY_ACK_TIMEOUT_SEC: {{ .Values.backend.messages.retryAckTimeoutSec | quote }}
  MESSAGES_RETRY_MAX_RETRIES: {{ .Values.backend.messages.retryMaxRetries | quote }}
  MESSAGES_RETRY_BATCH_LIMIT: {{ .Values.backend.messages.retryBatchLimit | quote }}
  MESSAGES_POLICY_RATE_LIMIT_PER_MINUTE: {{ .Values.backend.messages.policyRateLimitPerMinute | quote }}
  MESSAGES_POLICY_HOP_LIMIT: {{ .Values.backend.messages.policyHopLimit | quote }}
  MESSAGES_POLICY_CONTEXT_LIMIT_PCT: {{ .Values.backend.messages.policyContextLimitPct | quote }}
  MESSAGES_RETRY_RECIPIENT_OFFLINE_SEC: {{ .Values.backend.messages.retryRecipientOfflineSec | quote }}
  JWT_ACCESS_EXPIRATION_SECONDS: {{ .Values.backend.jwt.accessExpirationSeconds | quote }}
  JWT_REFRESH_EXPIRATION_SECONDS: {{ .Values.backend.jwt.refreshExpirationSeconds | quote }}
  # COOKIE_DOMAIN — 항상 명시 박음 (빈 string OK). 옛 if-조건 박혔을 때 ArgoCD 가
  # key 제거 안 박는 사고 패턴 (3-way merge 한계) 회피. backend 의 cookie_domain
  # default 가 ""  라 빈 값 박혀도 정합.
  COOKIE_DOMAIN: {{ .Values.backend.cookieDomain | quote }}
