apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-desk.fullname" . }}-frontend
  labels:
    {{- include "ai-desk.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-desk.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "ai-desk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          env:
            {{- if .Values.backend.metaverseUrl }}
            - name: METAVERSE_URL
              value: {{ .Values.backend.metaverseUrl | quote }}
            {{- end }}
            {{- if .Values.backend.allowedHosts }}
            - name: ALLOWED_HOSTS
              value: {{ .Values.backend.allowedHosts | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
