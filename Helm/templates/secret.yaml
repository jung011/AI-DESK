apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-desk.fullname" . }}
  labels:
    {{- include "ai-desk.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-password: {{ .Values.database.password | quote }}
  jwt-secret-key: {{ .Values.auth.jwtSecretKey | default (randAlphaNum 48) | quote }}
