apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-desk.fullname" . }}
  labels:
    {{- include "ai-desk.labels" . | nindent 4 }}
  annotations:
    # helm uninstall 시 secret 보존 — db-password 도 cluster state.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  db-password: {{ .Values.database.password | quote }}
# JWT secret 은 별도 secret (aidesk-ai-desk-jwt) 로 분리 — manual kubectl 운영.
# helm chart 가 jwt-secret-key 안 보유 → ArgoCD sync 시 secret rotate 가능성 0
# (옛 fix 가 ignoreDifferences 만으로 *비교 skip* — SSA apply 가 덮어쓰는 한계 회피).
# backend-deployment 의 JWT_SECRET_KEY env 가 aidesk-ai-desk-jwt secret 참조.
