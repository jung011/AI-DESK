apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-desk.fullname" . }}
  labels:
    {{- include "ai-desk.labels" . | nindent 4 }}
  annotations:
    # ArgoCD 가 sync 마다 helm template 재 render — 그때 jwt-secret-key 의 randAlphaNum
    # 이 새 값으로 평가돼서 매 sync 마다 secret rotate → 모든 JWT 무효 → 사용자 로그아웃.
    # 다음 annotation 으로 secret 의 변경 무시 + 처음 install 후 cluster 의 값 보존:
    #   - helm.sh/resource-policy: keep  → helm uninstall 시 secret 보존
    #   - argocd.argoproj.io/compare-options: IgnoreExtraneous → ArgoCD diff 시 ignore
    #   - argocd.argoproj.io/sync-options: Prune=false → sync 시 삭제 차단
    # 추가로 ApplicationSet 의 ignoreDifferences 에 /data/jwt-secret-key 등록되어
    # ArgoCD 가 *값 변경 자체를 무시*.
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  db-password: {{ .Values.database.password | quote }}
  # JWT secret: lookup 은 helm CLI (helm install) 에선 cluster 의 기존 값 조회 가능하지만
  # ArgoCD 는 helm template (client-side) 사용 → lookup empty → randAlphaNum 폴백.
  # ApplicationSet 의 ignoreDifferences 가 *진짜 fix* — 여기 lookup 은 helm CLI 운영 시
  # fallback 으로만 동작.
  {{- $name := include "ai-desk.fullname" . }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
  {{- $existingJwt := "" }}
  {{- if and $existing $existing.data (index $existing.data "jwt-secret-key") }}
  {{-   $existingJwt = (index $existing.data "jwt-secret-key" | b64dec) }}
  {{- end }}
  jwt-secret-key: {{ .Values.auth.jwtSecretKey | default $existingJwt | default (randAlphaNum 48) | quote }}
