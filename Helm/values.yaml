backend:
  image:
    repository: jsh125/aidesk-backend
    tag: "1.52-rc1"
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 30081
  tz: Asia/Seoul
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  cors:
    allowedOrigins: "http://172.20.1.3,http://aidesk.kaflix.internal"
  messages:
    retryAckTimeoutSec: "5"
    retryMaxRetries: "60"
    retryBatchLimit: "50"
    policyRateLimitPerMinute: "30"
    policyHopLimit: "10"
    policyContextLimitPct: "90"
    retryRecipientOfflineSec: "180"
  jwt:
    accessExpirationSeconds: "3600"
    refreshExpirationSeconds: "2592000"
  cookieDomain: ".kaflix.internal"
  metaverseUrl: "http://metaverse.kaflix.internal/"
  allowedHosts: ".kaflix.internal"

frontend:
  image:
    repository: jsh125/aidesk-frontend
    tag: "1.30-rc1"
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

database:
  host: host.docker.internal
  port: 5432
  name: aidesk
  username: postgres
  password: postgres

auth:
  jwtSecretKey: ""

service:
  backend:
    type: ClusterIP
    port: 30081
  frontend:
    type: ClusterIP
    port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  hosts:
    - host: aidesk.kaflix.internal
      paths:
        - path: /
          pathType: Prefix
          service: frontend
  tls: []
