backend:
  image:
    # roll-back to Spring (2026-06-19) — FastAPI rc3 가 prod DB 안 잡고 sqlite fallback
    # → 빈 dashboard. env 매핑 fix + rc4 빌드 후 재시도. 옛 backend-py image 는 registry
    # 에 그대로 남아있음 (jsh125/aidesk-backend-py:0.1.0-rc3).
    repository: jsh125/aidesk-backend
    tag: "1.53.10-rc1"
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 30081
  tz: Asia/Seoul
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  cors:
    allowedOrigins: "http://172.20.1.3,http://aidesk.kaflix.internal"
  messages:
    retryAckTimeoutSec: "5"
    retryMaxRetries: "60"
    retryBatchLimit: "50"
    policyRateLimitPerMinute: "30"
    policyHopLimit: "10"
    policyContextLimitPct: "90"
    retryRecipientOfflineSec: "180"
  jwt:
    accessExpirationSeconds: "3600"
    refreshExpirationSeconds: "2592000"
  cookieDomain: ".kaflix.internal"
  metaverseUrl: "http://metaverse.kaflix.internal/"
  allowedHosts: ".kaflix.internal"
frontend:
  image:
    repository: jsh125/aidesk-frontend
    tag: "1.30.5-rc1"
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
database:
  host: host.docker.internal
  port: 5432
  name: aidesk
  username: postgres
  password: postgres
auth:
  jwtSecretKey: ""
service:
  backend:
    type: ClusterIP
    port: 30081
  frontend:
    type: ClusterIP
    port: 80
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  hosts:
    - host: aidesk.kaflix.internal
      paths:
        - path: /
          pathType: Prefix
          service: frontend
  tls: []
