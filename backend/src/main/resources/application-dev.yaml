server:
  port: 30081

cors:
  allowed-origins: "http://localhost:30080,http://0.0.0.0:30080"
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  exposed-headers: Content-Disposition,Content-Type,Content-Length
  allow-credentials: true

spring:
  datasource:
    # 기본값은 prod 중앙 DB (우드 PC 의 docker postgres) — dev 도 prod 와 같은 데이터 본다.
    # 로컬 격리 DB 가 필요하면 환경변수로 override (예: SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/aidesk).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://172.20.1.3:5432/aidesk}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    root: INFO
    com.jsh.aidesk: DEBUG
    org.mybatis: DEBUG
