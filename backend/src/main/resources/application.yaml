spring:
  application:
    name: ai-desk
  profiles:
    active: dev

# 메시지 발신 정책 임계값. 운영 중에 운영자가 yaml 만 고쳐 재기동해도 반영되도록 외부화.
messages:
  policy:
    rate-limit-per-minute: 30   # 발신자당 1분 윈도우
    hop-limit: 10               # 답장 체인 최대 깊이
    context-limit-pct: 90       # 수신 AI 의 contextPct 가 이 값 이상이면 거절

# 에이전트 부트스트랩 — 새 tmux 세션이 처음 만들어진 직후 claude 에 자동 주입할 첫 프롬프트.
# 빈 문자열이면 주입 안 함. 작업 규칙 문서가 있는 위치를 명시해 두면 모든 신규 AI 가 동일 규약을 학습한다.
agents:
  bootstrap-prompt: |-
    먼저 /Users/jsh/Documents/jsh/workRole/목차.md 를 읽고 거기 안내된 모든 작업 규칙 문서들을 순서대로 숙지하세요. 숙지가 끝나면 그 규칙을 따라 이후 들어오는 작업을 처리해 주세요.

# 사내 협업 — kaflix-a2a Control Plane 연동. 외부 직원 에이전트 목록을 대시보드에 노출.
# A2A 워크스페이스는 t_aidesk_setting('a2a_workspace') 에 영속화되며, 대시보드 (me) 모달에서 설정한다.
kaflix:
  control-plane-url: http://172.20.1.3:8080
  # 이 백엔드를 운영하는 본인의 employeeId. 사내 동료 AI 목록에서 이 값과 일치하는 항목에
  # me=true 플래그가 붙고, 프론트는 "(me)" 표시 + [터미널 열기] 버튼 노출 처리한다.
  me-employee-id: liki

# 대시보드 임베드 VSCode (code-server). start.sh 가 동일 포트로 띄운다.
# 외부 노출 시엔 --auth password 로 바꾸고 url 도 그에 맞춰 갱신.
vscode:
  code-server-url: http://localhost:30082

mybatis:
  mapper-locations:
    - classpath*:mybatis/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    jdbc-type-for-null: NULL
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
