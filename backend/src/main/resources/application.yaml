spring:
  application:
    name: ai-desk
  profiles:
    active: dev

# 메시지 발신 정책 임계값. 운영 중에 운영자가 yaml 만 고쳐 재기동해도 반영되도록 외부화.
messages:
  policy:
    rate-limit-per-minute: 30   # 발신자당 1분 윈도우
    hop-limit: 10               # 답장 체인 최대 깊이
    context-limit-pct: 90       # 수신 AI 의 contextPct 가 이 값 이상이면 거절
  # Helper ACK 미수신 시 재발행 정책. retry window 가 helper SSE read timeout (120s) 보다
  # 길어야 VPN zombie 끊김 후 reconnect 까지 메시지 보존된다. window ≈ ack-timeout * max-retries.
  retry:
    ack-timeout-sec: 5    # 이 시간이 지나도 status='sent' 이면 재발행 대상
    max-retries: 60       # 60회 × 5초 = 약 5분 window. 그 후 status='failed'.
    batch-limit: 50       # 한 사이클당 최대 처리 메시지 수 (DB 부담 방지)

# 대시보드 임베드 VSCode (code-server). start.sh 가 동일 포트로 띄운다.
# 외부 노출 시엔 --auth password 로 바꾸고 url 도 그에 맞춰 갱신.
vscode:
  code-server-url: http://localhost:30082

# JWT — sample/backend_spring 패턴 동일.
# JWT_SECRET_KEY 환경변수 미설정 시 부팅 실패 (운영 안전장치). dev 는 .env / IDE 에 32B+ 임시값 세팅.
jwt:
  secret-key: ${JWT_SECRET_KEY:dev-only-32-byte-or-longer-secret-replace-in-prod!}
  access-expiration-seconds: 3600       # 1h
  refresh-expiration-seconds: 604800    # 7d

# 인증 쿠키 — prod HTTPS 환경에서는 true 로 (.env 또는 profile 별 override).
cookie:
  secure: false

mybatis:
  mapper-locations:
    - classpath*:mybatis/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    jdbc-type-for-null: NULL
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
