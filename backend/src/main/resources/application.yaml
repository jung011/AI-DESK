spring:
  application:
    name: ai-desk
  profiles:
    active: dev

# 메시지 발신 정책 임계값. 운영 중에 운영자가 yaml 만 고쳐 재기동해도 반영되도록 외부화.
messages:
  policy:
    rate-limit-per-minute: 30   # 발신자당 1분 윈도우
    hop-limit: 10               # 답장 체인 최대 깊이
    context-limit-pct: 90       # 수신 AI 의 contextPct 가 이 값 이상이면 거절

# 에이전트 부트스트랩 — 새 tmux 세션이 처음 만들어진 직후 claude 에 자동 주입할 첫 프롬프트.
# 빈 문자열이면 주입 안 함. 작업 규칙 문서가 있는 위치를 명시해 두면 모든 신규 AI 가 동일 규약을 학습한다.
agents:
  bootstrap-prompt: |-
    먼저 /Users/jsh/Documents/jsh/workRole/목차.md 를 읽고 거기 안내된 모든 작업 규칙 문서들을 순서대로 숙지하세요. 숙지가 끝나면 그 규칙을 따라 이후 들어오는 작업을 처리해 주세요.

mybatis:
  mapper-locations:
    - classpath*:mybatis/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    jdbc-type-for-null: NULL
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
