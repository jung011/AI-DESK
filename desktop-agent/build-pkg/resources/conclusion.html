<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, sans-serif; font-size: 13px; line-height: 1.5; padding: 18px; }
        h2 { margin-top: 0; }
        code {
            background: #444; color: #fff;
            padding: 2px 6px; border-radius: 3px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
        }
        @media (prefers-color-scheme: light) {
            code { background: #2d2d2d; color: #f5f5f5; }
        }
        .step { margin: 10px 0; }
    </style>
</head>
<body>
    <h2>설치 완료</h2>
    <p>AI Desk Helper 가 백그라운드에서 동작 중입니다. 브라우저에서 대시보드를 열어 동작을 확인하세요.</p>

    <div class="step">
        <strong>상태 확인</strong><br>
        <code>launchctl list | grep com.aidesk.agent</code>
    </div>
    <div class="step">
        <strong>로그 확인</strong><br>
        <code>tail -f ~/Library/Logs/aidesk-agent.err</code>
    </div>
    <div class="step">
        <strong>제거</strong><br>
        <code>launchctl bootout gui/$(id -u)/com.aidesk.agent</code><br>
        <code>sudo rm /usr/local/bin/aidesk-helper</code><br>
        <code>rm ~/Library/LaunchAgents/com.aidesk.agent.plist</code>
    </div>
</body>
</html>
