<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, sans-serif; font-size: 13px; line-height: 1.5; padding: 18px; }
        h2 { margin-top: 0; }
        ul { padding-left: 18px; }
        code {
            background: #444; color: #fff;
            padding: 2px 6px; border-radius: 3px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
        }
        @media (prefers-color-scheme: light) {
            code { background: #2d2d2d; color: #f5f5f5; }
        }
        .note { opacity: 0.65; font-size: 12px; margin-top: 14px; }
    </style>
</head>
<body>
    <h2>AI Desk Helper</h2>
    <p>이 설치 프로그램은 다음을 수행합니다:</p>
    <ul>
        <li><code>/usr/local/bin/aidesk-helper</code> 바이너리 설치</li>
        <li>Claude Code 훅 스크립트를 <code>/usr/local/share/aidesk/hooks/</code> 에 배치</li>
        <li>로그인 시 자동 시작되도록 LaunchAgent 등록</li>
    </ul>
    <p class="note">기존 Helper 가 실행 중이라면 자동으로 멈췄다가 새 버전으로 재기동됩니다.</p>
</body>
</html>
