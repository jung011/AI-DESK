# Frontend nginx — Nuxt SPA 정적 호스팅 + /api/* same-origin reverse proxy.
#
# 핵심:
#   같은 origin 에서 /api/* 요청을 backend container 로 proxy.
#   → 브라우저는 자기가 접속한 호스트(localhost / LAN IP / 모바일 wifi) 그대로 사용.
#   → NUXT_PUBLIC_API_BASE 가 baked-in 될 필요 없음, CORS 도 불필요 (same-origin).
#
# 동작 환경:
#   docker-compose default network 안에서 서비스명 'backend' 로 통신.
#   compose 밖에서 직접 띄울 땐 BACKEND_UPSTREAM env 로 override 가능 (envsubst 적용 시).
server {
  listen 80;
  absolute_redirect off;

  # /api/* 는 backend 컨테이너로 reverse proxy.
  # proxy_pass 끝에 슬래시 없음 → 경로(/api/agents) 그대로 backend 에 전달.
  location /api/ {
    proxy_pass http://backend:30081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE (Server-Sent Events) 지원 — long-lived 연결, 버퍼링 비활성.
    # /api/desktop/events 같은 endpoint 가 SSE 라 buffering 켜져 있으면 last-mile 지연 발생.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # /ws/* — WebSocket reverse proxy. frontend ↔ backend 실시간 메시지 push (Phase 0).
  # SSE 와 별개 path — same-origin 보장 + Upgrade/Connection 헤더로 WebSocket handshake 전달.
  location /ws/ {
    proxy_pass http://backend:30081;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    # long-lived connection — idle timeout 길게.
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
  }

  # subpath 배포 (NUXT_APP_BASE_URL=/ai-desk/) 를 *로컬 docker* 에서도 동작시키기 위한 세 갈래.
  # 중앙서버는 K8s ingress 의 rewrite-target 이 /ai-desk prefix 를 떼고 nginx 에 전달하지만,
  # 로컬 nginx 단독 서빙 시 ingress 가 없으므로 여기서 직접 매핑.

  # /ai-desk/api/* → backend
  location /ai-desk/api/ {
    rewrite ^/ai-desk(/api/.*)$ $1 break;
    proxy_pass http://backend:30081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # /ai-desk/_nuxt/* → file system 의 _nuxt (해시 파일, 영구 캐시)
  location /ai-desk/_nuxt/ {
    alias /usr/share/nginx/html/_nuxt/;
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
  }

  # /ai-desk/* (그 외) → SPA shell, client routing 은 index.html 로 fallback
  location /ai-desk/ {
    alias /usr/share/nginx/html/;
    try_files $uri /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # Nuxt SPA 정적 파일 + 매칭 안 되는 경로는 index.html 로 (client routing).
  root /usr/share/nginx/html;
  index index.html;

  # _nuxt/ 안의 chunk 들은 *파일명에 hash* 가 들어 있어 변경되면 새 파일명으로 바뀐다.
  # 따라서 immutable + 1년 캐싱 — 새 배포 후에도 옛 chunk 가 캐시에서 즉시 살아있음.
  location /_nuxt/ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    try_files $uri =404;
  }

  # index.html / 그 외 라우트는 *항상 새로* — 새 배포 직후 옛 index.html 캐시 때문에
  # 옛 hash 의 chunk 를 호출하다 404 → 빈 페이지 → 사용자가 수동 새로고침 해야 하던 결함 회피.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri =404;
  }
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri /index.html;
  }
}
