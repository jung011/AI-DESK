# Frontend nginx — Nuxt SPA 정적 호스팅 + /api/* same-origin reverse proxy.
#
# 핵심:
#   같은 origin 에서 /api/* 요청을 backend container 로 proxy.
#   → 브라우저는 자기가 접속한 호스트(localhost / LAN IP / 모바일 wifi) 그대로 사용.
#   → NUXT_PUBLIC_API_BASE 가 baked-in 될 필요 없음, CORS 도 불필요 (same-origin).
#
# 동작 환경:
#   docker-compose default network 안에서 서비스명 'backend' 로 통신.
#   compose 밖에서 직접 띄울 땐 BACKEND_UPSTREAM env 로 override 가능 (envsubst 적용 시).
server {
  listen 80;
  absolute_redirect off;

  # /api/* 는 backend 컨테이너로 reverse proxy.
  # proxy_pass 끝에 슬래시 없음 → 경로(/api/agents) 그대로 backend 에 전달.
  location /api/ {
    proxy_pass http://backend:30081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE (Server-Sent Events) 지원 — long-lived 연결, 버퍼링 비활성.
    # /api/desktop/events 같은 endpoint 가 SSE 라 buffering 켜져 있으면 last-mile 지연 발생.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # Nuxt SPA 정적 파일 + 매칭 안 되는 경로는 index.html 로 (client routing).
  root /usr/share/nginx/html;
  index index.html;
  location / {
    try_files $uri /index.html;
  }
}
